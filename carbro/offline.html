<!DOCTYPE html>
<html lang="de" data-theme="marine">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#08132a">
<title>Offline – CarBro</title>
<style>
  :root { --bg:#08132a; --surface:#101b33; --text:#d9e2ff; --text2:#bac9cc; --accent:#00daf3; --on:#00363d; }
  * { box-sizing:border-box; margin:0; }
  body { font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text);
    min-height:100dvh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:24px; gap:18px; }
  .badge { width:84px; height:84px; border-radius:24px; background:var(--surface);
    display:grid; place-content:center; box-shadow:0 12px 32px rgba(0,229,255,.15); }
  svg { stroke:var(--accent); }
  h1 { font-size:26px; }
  p { color:var(--text2); max-width:34ch; line-height:1.6; }
  a { display:inline-flex; align-items:center; gap:8px; background:var(--accent); color:var(--on);
    font-weight:700; padding:14px 26px; border-radius:12px; text-decoration:none; box-shadow:inset 0 1px 0 rgba(255,255,255,.25); }
</style>
</head>
<body>
  <div class="badge">
    <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l2-4h11l3 4"/><path d="M5 9h16v6H3V9z"/><circle cx="7.5" cy="16.5" r="1.5"/><circle cx="16.5" cy="16.5" r="1.5"/>
    </svg>
  </div>
  <h1>Du bist offline</h1>
  <p>Keine Verbindung gerade. Sobald du wieder online bist, läuft CarBro normal weiter – deine Checklisten sind sicher gespeichert.</p>
  <a href="./">Nochmal versuchen</a>
</body>
</html>
